spring:
  application:
    name: url-shortener

  datasource:
    url: jdbc:postgresql://localhost:5432/urlshortener
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema, JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

app:
  base-url: ${BASE_URL:http://localhost:8080}


  jwt:
    secret: ${JWT_SECRET:your-super-secret-key-change-this-in-production-min-256-bits}
    access-token-expiry-ms: 900000        # 15 minutes
    refresh-token-expiry-ms: 604800000    # 7 days

  short-code:
    length: 6
    max-retries: 5                        # Retry on collision

  redis:
    url-ttl-seconds: 3600                 # Cache redirects for 1 hour
    rate-limit-window-seconds: 60
    rate-limit-max-requests: 30           # Max 30 shortens per minute per user

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}  # Vue dev server

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.urlshortener: DEBUG
    org.springframework.security: INFO
