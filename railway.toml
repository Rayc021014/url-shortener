[build]
builder = "NIXPACKS"
buildCommand = "cd frontend && npm install && npm run build && cp -r dist/* ../src/main/resources/static/ && cd .. && ./mvnw clean package -DskipTests"

[deploy]
startCommand = "java -jar target/url-shortener-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod"
healthcheckPath = "/api-docs"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
