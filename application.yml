spring:
  application:
    name: url-shortener

  datasource:
    # Railway injects DATABASE_URL as: postgresql://user:pass@host:port/db
    # Spring needs:                     jdbc:postgresql://host:port/db  + separate user/pass
    # The ${DATABASE_URL:} fallback lets local dev still use the explicit values below.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/urlshortener}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5          # keep low — Railway free tier has connection limits

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      # Railway injects REDIS_URL as: redis://:password@host:port
      # Spring can parse this directly via the url property
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 5
          max-idle: 3
          min-idle: 1

app:
  base-url: ${BASE_URL:http://localhost:8080}

  jwt:
    secret: ${JWT_SECRET:your-super-secret-key-change-this-in-production-min-256-bits}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000

  short-code:
    length: 6
    max-retries: 5

  redis:
    url-ttl-seconds: 3600
    rate-limit-window-seconds: 60
    rate-limit-max-requests: 30

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

server:
  port: ${PORT:8080}          # Railway injects PORT automatically
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.urlshortener: INFO    # reduce to INFO in prod — DEBUG is too noisy
    org.springframework.security: WARN
